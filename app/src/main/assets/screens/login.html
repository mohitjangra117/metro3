<div class="screen" id="scr-login">
  <div class="content center" style="padding:50px 24px;gap:12px;">
    <div style="font-size:36px;">📱</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;">Log in to continue</div>
    <div style="font-size:11.5px;color:var(--ink-soft);">Enter your mobile number to get an OTP</div>
    <div style="width:100%;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--hair);border-radius:12px;padding:12px 14px;margin-top:8px;">
      <span style="font-weight:700;font-size:12.5px;color:var(--ink-soft);">+91</span>
      <input id="loginphone" class="searchinput" placeholder="98765 43210" maxlength="10" style="text-align:left;">
    </div>
    <div class="btn" id="loginbtn" style="width:100%;margin-top:10px;">Send OTP</div>
    <div style="font-size:10px;color:var(--muted);margin-top:6px;">By continuing you agree to the Terms &amp; Privacy Policy</div>
  </div>
</div>
