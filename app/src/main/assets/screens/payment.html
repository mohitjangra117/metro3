<div class="screen" id="scr-payment">
  <div class="appbar">
    <div class="ic" onclick="closePayment()">✕</div>
    <h2>Payment gateway</h2>
    <div style="width:30px;"></div>
  </div>
  <div class="content" id="pgmain">
    <div class="card center" style="background:var(--blue-tint);border:none;">
      <div style="font-size:10px;color:var(--blue-dark);font-weight:700;">AMOUNT PAYABLE</div>
      <div style="font-family:'Space Grotesk',sans-serif;font-size:23px;font-weight:700;" id="pgamount">₹--</div>
    </div>
    <div class="section-label">Choose UPI app</div>
    <div class="radiopt sel" data-payopt2>
      <div class="dot"></div>
      <div style="font-size:12px;font-weight:600;flex:1;">Google Pay</div>
      <div style="font-size:14px;">📱</div>
    </div>
    <div class="radiopt" data-payopt2>
      <div class="dot"></div>
      <div style="font-size:12px;font-weight:600;flex:1;">PhonePe</div>
      <div style="font-size:14px;">📲</div>
    </div>
    <div class="radiopt" data-payopt2>
      <div class="dot"></div>
      <div style="font-size:12px;font-weight:600;flex:1;">Paytm</div>
      <div style="font-size:14px;">💳</div>
    </div>
    <div class="radiopt" data-payopt2>
      <div class="dot"></div>
      <div style="font-size:12px;font-weight:600;flex:1;">BHIM UPI</div>
      <div style="font-size:14px;">🏦</div>
    </div>
    <div class="btn amber" id="pgpay" style="margin-top:auto;">Pay securely</div>
  </div>
  <div class="content center" id="pgprocessing" style="display:none;gap:14px;">
    <div class="spinner"></div>
    <div style="font-weight:700;font-size:13px;">Contacting your bank…</div>
    <div style="font-size:10.5px;color:var(--muted);">Do not press back or refresh</div>
  </div>
  <div class="content center" id="pgsuccess" style="display:none;gap:6px;">
    <div style="width:56px;height:56px;border-radius:50%;background:var(--green-tint);color:var(--green-dark);display:flex;align-items:center;justify-content:center;font-size:28px;">✓</div>
    <div style="font-weight:700;font-size:15px;margin-top:8px;">Payment successful</div>
    <div style="font-size:11px;color:var(--muted);" id="pgref">₹-- paid · Ref# DMRC29841773</div>
    <div class="btn done" style="margin-top:16px;width:100%;" onclick="afterPayment()">View e-ticket</div>
  </div>
</div>
