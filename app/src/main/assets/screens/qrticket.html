<div class="screen" id="scr-qrticket">
  <div class="appbar">
    <div class="ic" onclick="goRoot('home')">✕</div>
    <h2>Your ticket</h2>
    <div class="ic">↓</div>
  </div>
  <div class="content center">
    <div class="card" style="width:100%;text-align:center;">
      <div class="section-label" style="margin-top:0;" id="qrroute">NOIDA SECTOR 15 → KIRTI NAGAR</div>
      
      <!-- Styled QR container -->
      <div style="background:#fff; border: 1px solid var(--hair); border-radius: 12px; width:160px; height:160px; margin:20px auto; display:flex; align-items:center; justify-content:center; padding: 10px;">
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;width:100%;height:100%;">
          <div style="background:#0A1F33;grid-column:span 2;grid-row:span 2;"></div><div style="background:#0A1F33;"></div><div></div><div style="background:#0A1F33;grid-column:span 2;grid-row:span 2;"></div>
          <div></div><div></div>
          <div style="background:#0A1F33;"></div><div></div><div style="background:#0A1F33;"></div><div></div>
          <div></div><div style="background:#0A1F33;grid-column:span 2;"></div><div style="background:#0A1F33;"></div><div></div><div style="background:#0A1F33;"></div>
          <div style="background:#0A1F33;"></div><div></div><div style="background:#0A1F33;grid-column:span 3;"></div><div></div>
          <div style="background:#0A1F33;grid-column:span 2;grid-row:span 2;"></div><div></div><div style="background:#0A1F33;"></div><div></div><div style="background:#0A1F33;grid-column:span 2;grid-row:span 2;"></div>
          <div></div><div></div>
        </div>
      </div>
      
      <div style="font-size:11px;color:var(--muted);">Valid for 1 journey · Expires in <span id="qrcountdown" style="font-weight:700;color:var(--ink);">58:00</span></div>
    </div>
    <div class="kpi-row" style="width:100%;">
      <div class="kpi"><b id="qrfare">₹--</b><span>Fare</span></div>
      <div class="kpi"><b id="qrpax">1</b><span>Passenger</span></div>
    </div>
    <div class="btn ghost" style="width:100%;" onclick="goRoot('home')">Done</div>
  </div>
</div>
