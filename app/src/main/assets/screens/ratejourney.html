<div class="screen" id="scr-ratejourney">
  <div class="appbar">
    <div class="ic" onclick="goRoot('home')">✕</div>
    <h2>Rate your journey</h2>
    <div style="width:30px;"></div>
  </div>
  <div class="content center" id="ratemain">
    <div style="font-size:11.5px;color:var(--ink-soft);margin-top:6px;" id="ratejourneyroute">Noida Sector 15 → Kirti Nagar</div>
    <div id="starrow" style="display:flex;gap:6px;font-size:26px;margin:10px 0;">
      <span class="star" data-v="1">☆</span><span class="star" data-v="2">☆</span><span class="star" data-v="3">☆</span><span class="star" data-v="4">☆</span><span class="star" data-v="5">☆</span>
    </div>
    <div class="chiprow" style="justify-content:center;width:100%;">
      <span class="chip fbchip">On time</span>
      <span class="chip fbchip">Clean</span>
      <span class="chip fbchip">Crowded</span>
      <span class="chip fbchip">Comfortable</span>
    </div>
    <div class="btn" id="ratesubmit" style="margin-top:auto;width:100%;">Submit feedback</div>
  </div>
  <div class="content center" id="ratethanks" style="display:none;gap:6px;">
    <div style="font-size:32px;">🙏</div>
    <div style="font-weight:700;font-size:14px;">Thanks for riding with us!</div>
    <div style="font-size:11px;color:var(--muted);">Your feedback helps DMRC improve service.</div>
    <div class="btn ghost" style="margin-top:16px;width:100%;" onclick="goRoot('home')">Back to home</div>
  </div>
</div>
