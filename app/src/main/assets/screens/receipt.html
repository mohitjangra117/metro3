<div class="screen" id="scr-receipt">
  <div class="appbar">
    <div class="ic" onclick="back()">←</div>
    <h2>E-receipt</h2>
    <div class="ic" id="receiptshare">⇪</div>
  </div>
  <div class="content">
    <div class="card center" style="background:var(--green-tint);border:none;">
      <div style="color:var(--green-dark);font-weight:700;font-size:13px;">Journey completed ✓</div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;font-size:11.5px;"><span style="color:var(--muted);">From</span><b id="rcfrom">Noida Sector 15</b></div>
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;font-size:11.5px;"><span style="color:var(--muted);">To</span><b id="rcto">Kirti Nagar</b></div>
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;font-size:11.5px;"><span style="color:var(--muted);">Date</span><b>11 Jul 2026, 9:41 AM</b></div>
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;font-size:11.5px;"><span style="color:var(--muted);">Txn ID</span><b>DMRC29841773</b></div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><b id="rcfare">₹--</b><span>Fare paid</span></div>
      <div class="kpi"><b id="rctime">-- min</b><span>Duration</span></div>
    </div>
    <div class="btn ghost" id="receiptdownload">Download PDF</div>
    <div class="btn" style="margin-top:auto;" onclick="push('ratejourney')">Rate this journey</div>
  </div>
</div>
