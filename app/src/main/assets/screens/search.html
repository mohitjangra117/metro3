<div class="screen" id="scr-search">
  <div class="appbar">
    <div class="ic" onclick="back()">←</div>
    <h2>Search Station</h2>
    <div style="width:30px;"></div>
  </div>
  <div class="content" style="gap:8px;">
    <div style="display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--blue);border-radius:12px;padding:10px 13px;">
      <span style="color:var(--blue);">⌕</span>
      <input id="searchbox" class="searchinput" placeholder="Search station or landmark" oninput="filterStations(this.value)">
    </div>
    <div class="section-label" id="searchsectionlabel">Recent</div>
    <div id="searchresults" style="display:flex;flex-direction:column;gap:8px;"></div>
  </div>
</div>
