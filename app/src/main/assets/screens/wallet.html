<div class="screen" id="scr-wallet">
  <div class="statusbar"><span>9:41</span><span>●●● 5G 100%</span></div>
  <div class="appbar">
    <h2>Tickets &amp; Wallet</h2>
    <div class="ic" onclick="push('notifications')">🔔</div>
  </div>
  <div class="content">
    <div class="card" style="background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;border:none;">
      <div style="font-size:10px;opacity:.8;font-weight:700;">METRO WALLET BALANCE</div>
      <div style="font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;margin:4px 0;" id="walletbalbig">₹210</div>
      <div class="btn amber" style="margin-top:6px;" onclick="push('walletrecharge')">+ Add money</div>
    </div>
    <div class="section-label">Active tickets</div>
    <div class="list-item" onclick="push('qrticket')">
      <div class="icwrap">🎫</div>
      <div style="flex:1;">
        <div class="t">Noida Sec 15 → Kirti Nagar</div>
        <div class="s">Expires in 58 min</div>
      </div>
      <div class="r">›</div>
    </div>
    <div class="section-label">Passes &amp; cards</div>
    <div class="list-item">
      <div class="icwrap">💳</div>
      <div style="flex:1;">
        <div class="t">DMRC Smart Card</div>
        <div class="s">•••• 7734 · Linked</div>
      </div>
      <div class="badge">Active</div>
    </div>
    <div class="list-item" onclick="push('travelhistory')">
      <div class="icwrap">◷</div>
      <div style="flex:1;">
        <div class="t">Travel history</div>
        <div class="s">128 journeys logged</div>
      </div>
      <div class="r">›</div>
    </div>
  </div>
  <div class="bottomnav">
    <div class="n" data-tab="home" onclick="goRoot('home')"><span class="ni">⌂</span>Home</div>
    <div class="n" data-tab="map" onclick="goRoot('map')"><span class="ni">▦</span>Map</div>
    <div class="n active" data-tab="wallet" onclick="goRoot('wallet')"><span class="ni">🎫</span>Tickets</div>
    <div class="n" data-tab="profile" onclick="goRoot('profile')"><span class="ni">◍</span>Profile</div>
  </div>
</div>
